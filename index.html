<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>

    <!-- tailwind+daisy -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- favicon -->
    <link rel="shortcut icon" href="./jobs.png" type="image/x-icon">

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">

    <!-- font awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- link css -->
    <link rel="stylesheet" href="./styles/style.css">
</head>

<body class="bg-color min-h-screen">

    <header>
        <section class="container mx-auto w-10/12 pt-[60px] mb-[30px]">
            <h1 class="color-black font-bold text-[32px] mb-5">Job Application Tracker</h1>

            <div class="mb-[30px] grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="shadow bg-white p-5 rounded-lg">
                    <p class="text-[14px]">Total</p>
                    <h3 class="color-black text-2xl font-bold">8</h3>
                </div>

                <div class="shadow bg-white p-5 rounded-lg">
                    <p class="text-[14px]">Interview</p>
                    <h3 class="color-green text-2xl font-bold">0</h3>
                </div>

                <div class="shadow bg-white p-5 rounded-lg">
                    <p class="text-[14px]">Rejected</p>
                    <h3 class="color-red text-2xl font-bold">0</h3>
                </div>
            </div>
            <span class="text-[#E6E7E9]">
                <hr>
            </span>
        </section>

    </header>

    <main class="w-10/12 mx-auto">
        <div class="flex justify-between items-center">
            <h2 class="color-black text-[20px] font-semibold mb-6">Available Jobs</h2>
            <p class="text-[#323B49]/70">8 jobs</p>
        </div>
        <section>

            <div class="flex justify-start items-center text-[12px] gap-2 mb-4">
                <button class="bg-[#3B82F6] text-white px-8 py-2.5 shadow rounded-sm">All</button>
                <button class="text-[#64748B] px-3.5 py-2.5 shadow rounded-sm">Interview</button>
                <button class="text-[#64748B] px-3.5 py-2.5 shadow rounded-sm">Rejected</button>
            </div>

            <div class="p-6 shadow bg-white">
                <div class="space-y-5">
                    <div class="flex justify-between items-center">
                        <div class="space-y-1">
                            <h4 class="text-[18px] font-semibold">Mobile First Corp</h4>
                            <p class="text-[#64748B] text-[16px]">React Native Developer</p>
                        </div>
                        <button class="text-[#64748B] bg-white rounded-full btn btn-soft shadow p-2.5 border border-[#64748B]/30"><i class="fa-regular fa-trash-can"></i></button>
                    </div>

                    <div class="text-[14px] text-[#64748B] space-x-2">
                        <span>Remote</span> • <span class="ml-2">Full-time</span> • <span class="ml-2">$130,000 -
                            $175,000</span>
                    </div>

                    <div class="space-y-2">
                        <div class="py-2 px-3 bg-[#EEF4FF] inline-block">
                            <p>NOT APPLIED</p>
                        </div>
                        <P class="text-[14px] text-[#323B49]">Build cross-platform mobile applications using React
                            Native. Work on products used by millions of users worldwide.</P>
                    </div>

                    <div class="flex justify-start items-center gap-2">
                        <button class="btn btn-outline btn-success">INTERVIEW</button>
                        <button class="btn btn-outline btn-error">REJECTED</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

</body>

</html>
